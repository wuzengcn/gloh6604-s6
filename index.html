# What is Markov Model

- A Markov chain (discrete-time Markov chain) named after Andrey Markov, is a mathematical system that undergoes transitions from one state to another, among a finite or countable number of possible states

- Example of the health states: Healthy, Sick, and dead

- Transition among states

---
# What happen after 5 years 

Suppose at the beginning of first year, there are  1000 healthy people: [1000 0 0]

Transition matrix: 

`$$\begin{bmatrix}
0.80 &amp; 0.15 &amp; 0.05 \\
0.05 &amp; 0.70 &amp; 0.25 \\
0.00 &amp; 0.00 &amp; 1.00 \\
\end{bmatrix}$$`

Status at the end of the first year:

`$$\begin{bmatrix}1000 &amp; 0 &amp; 0 \\
\end{bmatrix}*
\begin{bmatrix}
0.80 &amp; 0.15 &amp; 0.05 \\
0.05 &amp; 0.70 &amp; 0.25 \\
0.00 &amp; 0.00 &amp; 1.00 \\
\end{bmatrix} =
\begin{bmatrix}
800 &amp; 150 &amp; 50 \\
\end{bmatrix}$$`
---
# Markov model continue... 

Status at the end after 2 years: 
`$$\begin{bmatrix}
800 &amp; 150 &amp; 50 \\ 
\end{bmatrix}* 
\begin{bmatrix}
0.80 &amp; 0.15 &amp; 0.05 \\
0.05 &amp; 0.70 &amp; 0.25 \\
0.00 &amp; 0.00 &amp; 1.00 \\
\end{bmatrix} \newline
= \begin{bmatrix}
1000 &amp; 0 &amp; 0 \\
\end{bmatrix} * \begin{bmatrix}
0.80 &amp; 0.15 &amp; 0.05 \\
0.05 &amp; 0.70 &amp; 0.25 \\
0.00 &amp; 0.00 &amp; 1.00 \\
\end{bmatrix}^2 = 
\begin{bmatrix}
647.5 &amp; 225 &amp; 127.5 \\
\end{bmatrix}$$`

Status at the end after 5 years: 

`$$\begin{bmatrix}
1000 &amp; 0 &amp; 0 \\
\end{bmatrix} * \begin{bmatrix}
0.80 &amp; 0.15 &amp; 0.05 \\
0.05 &amp; 0.70 &amp; 0.25 \\
0.00 &amp; 0.00 &amp; 1.00 \\
\end{bmatrix}^5 = \begin{bmatrix}
362 &amp; 246 &amp; 392 \\
\end{bmatrix}$$`

There will be 362 healthy individuals, 246 with illness, and 292 with death.

# Summary

- Decision tree model is used for modeling one-time event

- Markov model is useful for modelling repeated events and long-term effects

- The limitation of constant transition probabilities could be addressed by specifying transition probabilities at different time point

# How to construct a Markov model for cost-effectiveness analysis

---
# Principal elements

.pull-left[

Define mutually exclusive health states

- Transient, temporary, absorbing

Determine possible transitions between these health states

- State transitions

- Set of transition probabilities among states

  - Constant, time-dependent

Define clinically valid cycle length

Attach utility value and/or cost to health states
]

.pull-right[

&lt;center&gt;

&lt;image src = "libs/pic/S6-F37.png" width = "70%"&gt;

]
---
# Define health states: Natural history disease model

&lt;center&gt;

&lt;image src="libs/pic/S6-F6.png" width="70%"&gt;

&lt;/center&gt;

- **Mutually exclusive** and **collectively exhaustive** health states

- Best defined by actual biology/pathophysiology

- Markovian assumptions:

  - Homogeneity: All individuals in the same state have the same costs, quality of life, risks of transition

  - Memorilessness: The current state determines future risks

---
# Determine transition probabilities

&lt;center&gt;

&lt;image src="libs/pic/S6-F7.png" width="70%"&gt;

&lt;/center&gt;

- Transitions between health states (arrows)

- The proportion that do not transition stay in current state

- Risk of death at all times and from all states!

- If no transition out of a state = absorbing state (i.e., death)

# Properties of a Markov Model

Individuals are always in one of a finite number of health states

Events are modeled as transitions from one state to another

Time spent in each health state determines overall expected outcome

- Living longer without disease yields higher life expectancy and quality adjusted life expectancy

During each cycle of the model, individuals may make a transition from one state to another

---
# Assumptions 

Probability of transition depends only on current health state residence and not on past health states

Health state definitions should include all relevant history

- History of precancerous lesion

- History of acute myocardial infarction

- Time since HIV seroconversion

---
# Common Methods of Evaluation 

### Cohort simulation

- Hypothetical cohort of patients transition through the model simultaneously

### Monte Carlo simulation

- First order simulation randomly selects a patient from the hypothetical cohort and they transit through the model one at a time (First micro-simulation)

- The matrix becomes the probability of an individual transition from one state to another instead of the % of those in a given state who deterministically flow into another state

# Step 1: build the skeleton of Markov cycle tree

Starts with **decision note**

Then adds **Markov node** (most cases)

Adds branches that are health states starting each cycle

- The number of the branches equals to the number of health states

Subtree of each health state models all possible outcomes for an individual starting a cycle in that state

Terminal nodes return individual to a health state to start next cycle

# Rewards under the Health States

.pull-left[

State rewards accumulate value (cost, eff) by cycle

- Cost of treatment person with that state’s condition

- Utility (for QALYs) associated with the health state

Rewards..

- Initial: for the first cycle (often same as incremental)

  - Initiation reward is assigned only in the first cycle, Stage 0, 

  - only to individuals that spending stage 0 in that state

- Incremental: for every subsequent cycle

- Final: after the last cycle (usually 0)

  - Assign after the process is over to individuals 
  
  - Ending up in that state
]
